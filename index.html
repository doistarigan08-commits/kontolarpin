<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kontrol Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter, sans-serif;
}

body{
  background:#0b0f17;
  color:#e9eef7;
  overflow-x:hidden;
}

/* ================= BACKGROUND ================= */
.bg{
  position:fixed;
  inset:0;
  z-index:-3;
  background:
    radial-gradient(circle at 20% 20%, #ffffff10, transparent 40%),
    radial-gradient(circle at 80% 30%, #6aa6ff25, transparent 45%),
    radial-gradient(circle at 40% 80%, #ffffff08, transparent 50%);
  filter: blur(25px);
  animation: move 12s infinite alternate ease-in-out;
}

@keyframes move{
  0%{transform:translateY(0px) scale(1);}
  100%{transform:translateY(-25px) scale(1.1);}
}

/* ================= BLUR OVERLAY ================= */
.blur{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.35);
  backdrop-filter: blur(10px);
  opacity:0;
  pointer-events:none;
  transition:.25s;
  z-index:10;
}

.blur.show{
  opacity:1;
}

/* ================= CONTAINER ================= */
.container{
  max-width:900px;
  margin:auto;
  padding:25px;
}

/* ================= CARD ================= */
.card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;
  padding:18px;
  margin-bottom:15px;
  backdrop-filter: blur(14px);
}

/* ================= INPUT ================= */
input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.03);
  color:#fff;
  outline:none;
}

/* ================= BUTTON ================= */
button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#6aa6ff,#8ab4ff);
  color:#000;
  font-weight:600;
}

/* ================= TABLE ================= */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
  table-layout:fixed;
}

th,td{
  padding:12px;
  font-size:13px;
  border-bottom:1px solid rgba(255,255,255,0.06);
}

th{
  color:#9fb4ff;
}

/* FIX ALIGN GRID */
tr{
  display:grid;
  grid-template-columns: 1fr 120px 80px;
  align-items:center;
}

td{
  overflow:hidden;
}

/* EMAIL */
.email{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* badge */
.badge{
  padding:5px 10px;
  border-radius:999px;
  background:rgba(255,255,255,0.06);
}

/* DELETE */
.del{
  background:transparent;
  color:#ff6b86;
  border:1px solid rgba(255,92,122,0.4);
  padding:6px 10px;
  border-radius:10px;
}

/* ================= CENTER TOAST ================= */
.toast{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.9);
  background:rgba(20,20,25,0.9);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(14px);
  padding:18px 22px;
  border-radius:16px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  opacity:0;
  pointer-events:none;
  transition:.25s;
  z-index:9999;
  min-width:200px;
  text-align:center;
}

.toast.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}

.icon{
  width:26px;
  height:26px;
}

/* svg */
svg{
  width:26px;
  height:26px;
  stroke:#fff;
}

/* text */
.toast span{
  font-size:13px;
  opacity:0.9;
}
</style>
</head>

<body>

<div class="bg"></div>
<div id="blur" class="blur"></div>

<!-- TOAST -->
<div id="toast" class="toast">
  <div id="icon"></div>
  <span id="msg"></span>
</div>

<div class="container">

<div class="card">
  <h2>Panel Control</h2>
  <input id="email" placeholder="email@gmail.com">
  <input id="limit" type="number" value="100">
  <button onclick="addEmail()">Add Email</button>
</div>

<div class="card">
  <h2>Database</h2>
  <table>
    <thead>
      <tr>
        <th>Email</th>
        <th>Limit</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="list"></tbody>
  </table>
</div>

</div>

<script>

const API = "/api/proxy?type=";
let data = [];

/* TOAST */
function toast(type,msg){

  const t = document.getElementById("toast");
  const blur = document.getElementById("blur");
  const icon = document.getElementById("icon");
  const text = document.getElementById("msg");

  let svg = "";

  if(type==="add"){
    svg = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2">
      <path d="M20 6L9 17l-5-5"/>
    </svg>`;
  }

  if(type==="del"){
    svg = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2">
      <path d="M18 6L6 18M6 6l12 12"/>
    </svg>`;
  }

  icon.innerHTML = svg;
  text.innerText = msg;

  t.classList.add("show");
  blur.classList.add("show");

  setTimeout(()=>{
    t.classList.remove("show");
    blur.classList.remove("show");
  },1800);
}

/* LOAD */
async function load(){
  const res = await fetch(API+"data");
  data = await res.json();
  render();
}

/* RENDER */
function render(){
  const el = document.getElementById("list");

  if(!data.length){
    el.innerHTML = `<tr><td colspan="3">Empty</td></tr>`;
    return;
  }

  el.innerHTML = data.map(v=>`
    <tr>
      <td class="email">${v.email}</td>
      <td><span class="badge">${v.jumlahResult}</span></td>
      <td><button class="del" onclick="del('${v.email}')">Del</button></td>
    </tr>
  `).join("");
}

/* ADD */
async function addEmail(){
  const email = document.getElementById("email").value;
  const limit = document.getElementById("limit").value;

  await fetch(API+"add",{
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:`email=${email}&jumlahResult=${limit}`
  });

  document.getElementById("email").value="";

  load();
  toast("add","Success di tambahkan");
}

/* DELETE */
async function del(email){

  await fetch(API+"delete",{
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:`email=${email}`
  });

  load();
  toast("del","Success di hapus email");
}

load();
setInterval(load,4000);

</script>

</body>
</html>

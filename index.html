<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DOISXPANEL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<style>
body{
    margin:0;
    font-family:Inter, sans-serif;
    background:#070A12;
    color:#fff;
}

#particles-js{
    position:fixed;
    inset:0;
    z-index:-1;
}

.wrap{max-width:900px;margin:auto;padding:20px;}

.card{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:18px;
    padding:18px;
    margin:14px 0;
    animation:fade .4s ease;
}

@keyframes fade{
    from{opacity:0;transform:translateY(10px)}
    to{opacity:1;transform:translateY(0)}
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.08);
    background:rgba(0,0,0,0.3);
    color:#fff;
    outline:none;
}

input:focus{
    border-color:#4f7cff;
    transform:scale(1.02);
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    margin-top:10px;
    cursor:pointer;
    font-weight:600;
    background:linear-gradient(135deg,#4f7cff,#7aa8ff);
    color:#fff;
}

.danger{
    background:linear-gradient(135deg,#ff3b5c,#ff6a6a);
}

table{width:100%;margin-top:10px;border-collapse:collapse;}

th,td{
    padding:10px;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.center{text-align:center}
.badge{padding:4px 10px;background:#222;border-radius:8px;}
</style>
</head>

<body>

<div id="particles-js"></div>

<div class="wrap">

<div class="card">
<h2>PANEL DOISXBILXZ</h2>

<input id="email" placeholder="email@gmail.com">
<input id="limit" type="number" value="100">
<input id="nick" placeholder="Nama Result">

<button onclick="addEmail()">Add Email</button>
</div>

<div class="card">
<h2>Database</h2>

<table>
<thead>
<tr>
<th>Email</th>
<th class="center">Limit</th>
<th class="center">Action</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>

</div>

</div>

<script>
const BASE = "/api/proxy";
let currentData = [];

/* GET DATA */
async function getData(){
    const res = await fetch(BASE+"?type=data&t="+Date.now());
    const text = await res.text();

    const match = text.match(/\[[\s\S]*\]/);
    if(!match) return [];

    return JSON.parse(match[0]);
}

/* LOAD */
async function load(){
    currentData = await getData();
    render();
}

/* RENDER */
function render(){
    const list = document.getElementById("list");

    if(currentData.length===0){
        list.innerHTML="<tr><td colspan=3>No Data</td></tr>";
        return;
    }

    let html="";

    currentData.forEach(v=>{
        html+=`
        <tr>
            <td>${v.email}</td>
            <td class="center">${v.jumlahResult}</td>
            <td class="center">
                <button onclick="gantiNama('${encodeURIComponent(v.email)}')">Edit</button>
                <button class="danger" onclick="del('${encodeURIComponent(v.email)}')">Del</button>
            </td>
        </tr>`;
    });

    list.innerHTML=html;
}

/* ADD */
async function addEmail(){
    const email = emailEl.value;
    const limit = limitEl.value;

    if(!email) return alert("isi email");

    if(currentData.some(v=>v.email===email)){
        return alert("email sudah ada");
    }

    currentData.unshift({email, jumlahResult:limit});
    render();

    let fd=new FormData();
    fd.append("email",email);
    fd.append("jumlahResult",limit);

    await fetch(BASE+"?type=add",{method:"POST",body:fd});
}

/* DELETE */
function del(email){
    email = decodeURIComponent(email);

    let found=false;

    currentData = currentData.filter(v=>{
        if(!found && v.email===email){
            found=true;
            return false;
        }
        return true;
    });

    render();

    let fd=new FormData();
    fd.append("email",email);

    fetch(BASE+"?type=delete",{method:"POST",body:fd});
}

/* EDIT */
async function gantiNama(email){
    email = decodeURIComponent(email);
    const nick = document.getElementById("nick").value;

    if(!nick) return alert("isi nick");

    await fetch(`${BASE}?type=ganti&nick=${encodeURIComponent(nick)}&sender=${encodeURIComponent(email)}`);

    alert("Berhasil diubah");
}

load();

/* particles */
particlesJS("particles-js",{particles:{number:{value:40},color:{value:"#4f7cff"},size:{value:2},move:{speed:1}}});
</script>

</body>
</html>

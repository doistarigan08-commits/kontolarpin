<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DOISXPANEL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<style>
body{
    margin:0;
    font-family:Inter, sans-serif;
    background:#070A12;
    color:#fff;
}

#particles-js{
    position:fixed;
    inset:0;
    z-index:-1;
}

.wrap{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:18px;
    padding:18px;
    margin:14px 0;
    animation:fade .4s ease;
    transition:.25s;
}

.card:hover{
    transform:translateY(-2px);
    border-color:#4f7cff;
}

@keyframes fade{
    from{opacity:0;transform:translateY(10px)}
    to{opacity:1;transform:translateY(0)}
}

input{
    width:100%;
    box-sizing:border-box;
    padding:12px;
    margin-top:10px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.08);
    background:rgba(0,0,0,0.3);
    color:#fff;
    outline:none;
    transition:.25s;
}

input:focus{
    border-color:#4f7cff;
    background:rgba(0,0,0,0.45);
    transform:scale(1.02);
}

input:active{
    transform:scale(0.99);
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    margin-top:10px;
    cursor:pointer;
    font-weight:600;
    background:linear-gradient(135deg,#4f7cff,#7aa8ff);
    color:#fff;
    transition:.2s;
}

button:hover{transform:scale(1.02)}
button:active{transform:scale(.96)}

.danger{
    background:linear-gradient(135deg,#ff3b5c,#ff6a6a);
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th,td{
    padding:10px;
    font-size:13px;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

th{opacity:.6;text-align:left}
.center{text-align:center}

.badge{
    padding:4px 10px;
    border-radius:10px;
    background:rgba(255,255,255,0.06);
}

.row{
    animation:fade .3s ease;
}
</style>
</head>

<body>

<div id="particles-js"></div>

<div class="wrap">

<div class="card">
<h2>PANEL DOISXBILXZ</h2>

<input id="email" placeholder="email@gmail.com">
<input id="limit" type="number" value="100">

<button onclick="addEmail()">Add Email</button>
</div>

<div class="card">
<h2>Database Live</h2>

<table>
<thead>
<tr>
<th>Email</th>
<th class="center">Limit</th>
<th class="center">Action</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>

</div>

</div>

<script>

/* =========================
   CONFIG
========================= */
const BASE = "/api/proxy";
const ADMIN_KEY = "DOIS-ADMIN-123";

/* =========================
   STATE
========================= */
let currentData = [];

/* =========================
   GET DATA
========================= */
async function getData(){
    try{
        const res = await fetch(BASE + "?type=data&t=" + Date.now());
        const text = await res.text();

        const match = text.match(/\[[\s\S]*\]/);
        return match ? JSON.parse(match[0]) : [];
    }catch(e){
        return [];
    }
}

/* =========================
   LOAD
========================= */
async function loadAwal(){
    currentData = await getData();
    render();
}

/* =========================
   RENDER
========================= */
function render(){
    const list = document.getElementById("list");

    if(currentData.length === 0){
        list.innerHTML = `<tr><td colspan="3" class="center">No Data</td></tr>`;
        return;
    }

    let html = "";

    currentData.forEach(v=>{
        html += `
        <tr class="row">
            <td>${v.email}</td>
            <td class="center"><span class="badge">${v.jumlahResult}</span></td>
            <td class="center">
                <button class="danger" onclick="del('${encodeURIComponent(v.email)}')">Del</button>
            </td>
        </tr>`;
    });

    list.innerHTML = html;
}

/* =========================
   ADD EMAIL (BLACKLIST CHECK)
========================= */
async function addEmail(){
    const email = document.getElementById("email").value.trim();
    const limit = document.getElementById("limit").value;

    if(!email) return alert("isi email");

    let fd = new FormData();
    fd.append("email", email);
    fd.append("jumlahResult", limit);

    try{

        const res = await fetch(BASE+"?type=add",{
            method:"POST",
            body:fd
        });

        const text = await res.text(); // 🔥 jangan langsung json

        let data;

        try {
            data = JSON.parse(text); // coba parse
        } catch (e) {
            console.log("RAW RESPONSE:", text);
            return alert("Server error / response bukan JSON");
        }

        if(data.success === false){
            alert(data.message || "Blocked / Invalid Email");
            return;
        }

        currentData.unshift({email, jumlahResult:limit});
        render();

        document.getElementById("email").value = "";

    }catch(err){
        console.log("ERROR:", err);
        alert("Gagal konek ke server");
    }
}

/* =========================
   DELETE (masuk blacklist server)
========================= */
function del(email){

    email = decodeURIComponent(email);

    currentData = currentData.filter(v => v.email !== email);
    render();

    let fd = new FormData();
    fd.append("email", email);

    fetch(BASE+"?type=delete",{
        method:"POST",
        body:fd
    });
}

/* =========================
   INIT
========================= */
loadAwal();

/* particles */
particlesJS("particles-js",{
    particles:{
        number:{value:40},
        color:{value:"#4f7cff"},
        size:{value:2},
        opacity:{value:0.3},
        line_linked:{
            enable:true,
            distance:140,
            color:"#4f7cff"
        },
        move:{speed:1}
    }
});

</script>

</body>
</html>

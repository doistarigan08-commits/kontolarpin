<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>DOIS PANEL • Premium UI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<style>
/* ======================
   BASE STYLE (CLEAN IOS)
====================== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
}

body{
    background:#0b0f14;
    color:#eaeaea;
    overflow-x:hidden;
}

/* ======================
   PARTICLE BACKGROUND
====================== */
#particles-js{
    position:fixed;
    inset:0;
    z-index:-1;
    opacity:0.35;
}

/* ======================
   MAIN WRAP
====================== */
.wrap{
    max-width:900px;
    margin:auto;
    padding:24px;
    animation:pageIn .6s ease;
}

@keyframes pageIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

/* ======================
   GLASS CARD IOS STYLE
====================== */
.card{
    background: rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:18px;
    padding:18px;
    margin:14px 0;
    backdrop-filter: blur(14px);
    transition:.25s ease;
}

.card:hover{
    transform: translateY(-3px);
    border-color: rgba(255,255,255,0.2);
}

/* ======================
   INPUT CLEAN IOS
====================== */
input{
    width:100%;
    padding:12px 14px;
    margin-top:10px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.03);
    color:#fff;
    outline:none;
    transition:.60s;
}

/* focus soft (NO SHADOW) */
input:focus{
    border-color:#7aa8ff;
    transform:scale(1.01);
    background:rgba(255,255,255,0.06);
}

/* ======================
   BUTTON IOS STYLE
====================== */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    margin-top:10px;
    cursor:pointer;
    font-weight:600;
    color:#fff;
    background:#2c3440;
    transition:.2s ease;
}

button:hover{
    transform: scale(1.02);
    background:#3a4657;
}

button:active{
    transform: scale(0.96);
}

/* danger */
.danger{
    background:#ff4d4d;
}

/* ======================
   TABLE CLEAN
====================== */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th,td{
    padding:12px;
    border-bottom:1px solid rgba(255,255,255,0.06);
    font-size:13px;
}

th{
    text-align:left;
    color:#9aa4b2;
}

.center{text-align:center}

/* badge */
.badge{
    padding:4px 10px;
    border-radius:10px;
    background:rgba(255,255,255,0.06);
    font-size:12px;
}

/* row animation */
.row{
    animation:fade .3s ease;
}

@keyframes fade{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

/* header */
h2{
    font-weight:600;
    letter-spacing:.5px;
}
small{
    opacity:.6;
}
</style>
</head>

<body>

<div id="particles-js"></div>

<div class="wrap">

    <div class="card">
        <h2>DOIS PANEL</h2>
        <small>Premium System UI • 2026</small>

        <input id="email" placeholder="email@gmail.com">
        <input id="limit" type="number" value="100">

        <button onclick="addEmail()">+ Add Email</button>
    </div>

    <div class="card">
        <h2>LIST EMAIL DOIS</h2>

        <table>
            <thead>
                <tr>
                    <th>Email</th>
                    <th class="center">Limit</th>
                    <th class="center">Action</th>
                </tr>
            </thead>
            <tbody id="list"></tbody>
        </table>
    </div>

</div>

<script>

const BASE = "/api/proxy";
let dataStore = [];

/* GET */
async function getData(){
  const res = await fetch(BASE+"?type=data&t="+Date.now());
  const text = await res.text();

  const match = text.match(/\[[\s\S]*\]/);
  if(!match) return [];

  return JSON.parse(match[0]);
}

/* LOAD */
async function load(){
  dataStore = await getData();
  render();
}

/* RENDER */
function render(){
  const el = document.getElementById("list");

  if(dataStore.length === 0){
    el.innerHTML = `<tr><td colspan="3" class="center">EMPTY</td></tr>`;
    return;
  }

  el.innerHTML = dataStore.map(v=>`
    <tr>
      <td>${v.email}</td>
      <td class="center"><span class="badge">${v.jumlahResult}</span></td>
      <td class="center">
        <button class="danger" onclick="del('${encodeURIComponent(v.email)}')">Del</button>
      </td>
    </tr>
  `).join("");
}

/* ADD */
async function addEmail(){

  const email = document.getElementById("email").value.trim();
  const limit = document.getElementById("limit").value;

  if(!email) return alert("email kosong");

  const fd = new FormData();
  fd.append("email", email);
  fd.append("jumlahResult", limit);

  await fetch(BASE+"?type=add",{
    method:"POST",
    body:fd
  });

  load();
}

/* DELETE */
async function del(email){

  email = decodeURIComponent(email);

  const fd = new FormData();
  fd.append("email", email);

  await fetch(BASE+"?type=delete",{
    method:"POST",
    body:fd
  });

  load();
}

/* INIT */
load();

</script>

</body>
</html>

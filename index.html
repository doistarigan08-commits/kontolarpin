<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DOIS PANEL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:system-ui, sans-serif;
  background:#f5f6f8;
  color:#111;
}

/* container */
.wrap{
  max-width:900px;
  margin:auto;
  padding:20px;
}

/* card */
.card{
  background:#fff;
  border-radius:16px;
  padding:18px;
  margin-bottom:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
  animation:fade .3s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

/* input */
input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ddd;
  outline:none;
  transition:.2s;
}

input:focus{
  border-color:#111;
  transform:scale(1.01);
}

/* button */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#111;
  color:#fff;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  transform:scale(1.02);
  opacity:0.9;
}

button:active{
  transform:scale(0.98);
}

/* table */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  padding:10px;
  border-bottom:1px solid #eee;
  font-size:14px;
}

th{
  text-align:left;
  color:#888;
}

.center{
  text-align:center;
}

/* delete button */
.del{
  background:#ff3b3b;
}
</style>
</head>

<body>

<div class="wrap">

<div class="card">
<h3>Add Email</h3>
<input id="email" placeholder="email@gmail.com">
<input id="limit" type="number" value="100">
<button onclick="addEmail()">Add</button>
</div>

<div class="card">
<h3>Database</h3>

<table>
<thead>
<tr>
<th>Email</th>
<th class="center">Limit</th>
<th class="center">Action</th>
</tr>
</thead>

<tbody id="list"></tbody>
</table>
</div>

</div>

<script>

const BASE = "/api/proxy";

let currentData = [];

/* =========================
   REALTIME LOOP
========================= */
async function fetchData(){
  try{
    const res = await fetch(BASE+"?type=data&t="+Date.now());
    const data = await res.json();

    currentData = Array.isArray(data) ? data : [];
    render();

  }catch(e){
    console.log(e);
  }
}

setInterval(fetchData, 2500);

/* =========================
   ADD
========================= */
async function addEmail(){

  const email = document.getElementById("email").value.trim();
  const limit = document.getElementById("limit").value;

  if(!email) return alert("isi email");

  const body = `email=${encodeURIComponent(email)}&jumlahResult=${limit}`;

  await fetch(BASE+"?type=add",{
    method:"POST",
    headers:{
      "Content-Type":"application/x-www-form-urlencoded"
    },
    body
  });

  document.getElementById("email").value = "";
  fetchData();
}

/* =========================
   DELETE
========================= */
async function del(email){

  const body = `email=${encodeURIComponent(email)}`;

  await fetch(BASE+"?type=delete",{
    method:"POST",
    headers:{
      "Content-Type":"application/x-www-form-urlencoded"
    },
    body
  });

  fetchData();
}

/* =========================
   RENDER
========================= */
function render(){

  const el = document.getElementById("list");

  if(!currentData.length){
    el.innerHTML = `<tr><td colspan="3" class="center">Empty</td></tr>`;
    return;
  }

  el.innerHTML = currentData.map(v=>`
    <tr>
      <td>${v.email}</td>
      <td class="center">${v.jumlahResult}</td>
      <td class="center">
        <button class="del" onclick="del('${v.email}')">Delete</button>
      </td>
    </tr>
  `).join("");
}

/* init */
fetchData();

</script>

</body>
</html>

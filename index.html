<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kontrol Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter, sans-serif;
}

body{
  background:#0b0f17;
  color:#e9eef7;
  overflow-x:hidden;
}

/* ================= AURORA ================= */
.bg{
  position:fixed;
  inset:0;
  z-index:-3;
  background:
    radial-gradient(circle at 20% 20%, #ffffff10, transparent 40%),
    radial-gradient(circle at 80% 30%, #6aa6ff25, transparent 45%),
    radial-gradient(circle at 40% 80%, #ffffff08, transparent 50%);
  filter: blur(25px);
  animation: move 12s infinite alternate ease-in-out;
}

@keyframes move{
  0%{transform:translateY(0px) scale(1);}
  100%{transform:translateY(-25px) scale(1.1);}
}

/* ================= BLUR OVERLAY (TOAST ACTIVE) ================= */
.blur{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.35);
  backdrop-filter: blur(8px);
  opacity:0;
  pointer-events:none;
  transition:.25s;
  z-index:10;
}

.blur.show{
  opacity:1;
}

/* ================= CONTAINER ================= */
.container{
  max-width:900px;
  margin:auto;
  padding:25px;
}

/* ================= CARD ================= */
.card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;
  padding:18px;
  margin-bottom:15px;
  backdrop-filter: blur(14px);
  animation:fadeIn .5s ease forwards;
  opacity:0;
  transform:translateY(15px);
}

@keyframes fadeIn{
  to{opacity:1;transform:translateY(0);}
}

/* ================= INPUT ================= */
input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.03);
  color:#fff;
  outline:none;
  transition:.2s;
}

input:focus{
  border-color:#8ab4ff;
  background:rgba(255,255,255,0.06);
  transform:scale(1.01);
}

/* ================= BUTTON ================= */
button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#6aa6ff,#8ab4ff);
  color:#000;
  font-weight:600;
  cursor:pointer;
  transition:.2s;
}

button:hover{transform:translateY(-2px);}
button:active{transform:scale(0.98);}

/* ================= TABLE ================= */
table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
  margin-top:10px;
}

th,td{
  padding:12px;
  font-size:13px;
  border-bottom:1px solid rgba(255,255,255,0.06);
}

th{
  color:#9fb4ff;
  font-weight:500;
}

tr{
  animation:rowIn .3s ease forwards;
  opacity:0;
  transform:translateY(10px);
}

@keyframes rowIn{
  to{opacity:1;transform:translateY(0);}
}

.email{
  display:block;
  max-width:260px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.badge{
  padding:5px 10px;
  border-radius:999px;
  background:rgba(255,255,255,0.06);
}

/* ================= DELETE ================= */
.del{
  background:transparent;
  color:#ff6b86;
  border:1px solid rgba(255,92,122,0.4);
  padding:6px 10px;
  border-radius:10px;
  font-size:12px;
}

/* ================= TOAST ================= */
.toast{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%) translateY(-20px);
  background:rgba(20,20,25,0.85);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  padding:12px 16px;
  border-radius:14px;
  display:flex;
  gap:8px;
  align-items:center;
  font-size:13px;
  opacity:0;
  pointer-events:none;
  transition:.25s;
  z-index:9999;
}

.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

.toast #icon{
  width:18px;
  height:18px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.toast svg{
  width:18px;
  height:18px;
  stroke:#fff;
}
</style>
</head>

<body>

<div class="bg"></div>
<div id="blur" class="blur"></div>

<!-- TOAST -->
<div id="toast" class="toast">
  <div id="icon"></div>
  <span id="msg">Success</span>
</div>

<div class="container">

<div class="card">
  <h2>Panel Control</h2>
  <input id="email" placeholder="email@gmail.com">
  <input id="limit" type="number" value="100">
  <button onclick="addEmail()">Add Email</button>
</div>

<div class="card">
  <h2>Database</h2>
  <table>
    <thead>
      <tr>
        <th>Email</th>
        <th>Limit</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="list"></tbody>
  </table>
</div>

</div>

<script>

const API = "/api/proxy?type=";
let data = [];

/* ================= TOAST + BLUR ================= */
function toast(type, message){

  const t = document.getElementById("toast");
  const blur = document.getElementById("blur");
  const icon = document.getElementById("icon");
  const msg = document.getElementById("msg");

  let svg = "";

  if(type === "add"){
    svg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M20 6L9 17l-5-5"/>
    </svg>`;
  }

  if(type === "del"){
    svg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M18 6L6 18M6 6l12 12"/>
    </svg>`;
  }

  icon.innerHTML = svg;
  msg.innerText = message;

  t.classList.add("show");
  blur.classList.add("show");

  setTimeout(()=>{
    t.classList.remove("show");
    blur.classList.remove("show");
  },2000);
}

/* ================= LOAD ================= */
async function load(){
  const res = await fetch(API + "data");
  data = await res.json();
  render();
}

/* ================= RENDER ================= */
function render(){
  const el = document.getElementById("list");

  if(!data.length){
    el.innerHTML = `<tr><td colspan="3">Empty</td></tr>`;
    return;
  }

  el.innerHTML = data.map(v=>`
    <tr>
      <td><span class="email">${v.email}</span></td>
      <td><span class="badge">${v.jumlahResult}</span></td>
      <td><button class="del" onclick="del('${v.email}')">Del</button></td>
    </tr>
  `).join("");
}

/* ================= ADD ================= */
async function addEmail(){
  const email = document.getElementById("email").value;
  const limit = document.getElementById("limit").value;

  await fetch(API + "add", {
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:`email=${email}&jumlahResult=${limit}`
  });

  document.getElementById("email").value = "";
  load();

  toast("add","Success di tambahkan");
}

/* ================= DELETE ================= */
async function del(email){
  await fetch(API + "delete", {
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:`email=${email}`
  });

  load();

  toast("del","Success di hapus email");
}

load();
setInterval(load, 4000);

</script>

</body>
</html>
